name: Atualizar dados Bitrix24

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar dados do Bitrix24
        env:
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
        run: node scripts/fetch-bitrix.js

      - name: Commit data.json se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Sem mudancas nos dados."
          else
            git commit -m "chore: atualiza dados Bitrix24"
            git push
          fi
